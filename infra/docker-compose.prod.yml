services:
  caddy:
    image: caddy:2-alpine
    container_name: zentra-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - zentra_caddy_data:/data
      - zentra_caddy_config:/config
    depends_on:
      web:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        API_INTERNAL_URL: http://api:4000
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
    container_name: zentra-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      API_INTERNAL_URL: http://api:4000
    env_file:
      - ../.env.prod
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.prod
    container_name: zentra-api
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - ../.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: apps/api/worker.Dockerfile
    container_name: zentra-worker
    restart: unless-stopped
    env_file:
      - ../.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    container_name: zentra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - zentra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zentra-redis
    restart: unless-stopped
    volumes:
      - zentra_redis:/data

  minio:
    image: minio/minio:latest
    container_name: zentra-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - zentra_minio:/data

  minio-init:
    image: minio/mc:latest
    container_name: zentra-minio-init
    depends_on:
      - minio
    env_file:
      - ../.env.prod
    volumes:
      - ./:/infra
    entrypoint: ["/bin/sh", "/infra/minio-create-bucket.sh"]
    restart: "no"

  migrate:
    image: pgvector/pgvector:pg16
    container_name: zentra-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.prod
    volumes:
      - ../db/migrations:/migrations:ro
    entrypoint: >
      sh -c '
        for f in /migrations/*.sql; do
          echo "Applying $$f..."
          PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f "$$f" || true
        done
        echo "Migrations complete."
      '
    restart: "no"

volumes:
  zentra_pgdata:
  zentra_redis:
  zentra_minio:
  zentra_caddy_data:
  zentra_caddy_config:
