version: "3.9"

services:
  web:
    image: node:20-alpine
    container_name: zentra-web
    working_dir: /app
    command: sh -c "npm install && npm --workspace apps/web run dev"
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - web_node_modules:/app/node_modules
    env_file:
      - ../.env
    depends_on:
      - api

  api:
    image: node:20-alpine
    container_name: zentra-api
    working_dir: /app
    command: sh -c "npm install && npm --workspace apps/api run dev"
    ports:
      - "4000:4000"
    volumes:
      - ..:/app
      - api_node_modules:/app/node_modules
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: node:20-alpine
    container_name: zentra-worker
    working_dir: /app
    command: sh -c "npm install && npm --workspace apps/api run worker:dev"
    volumes:
      - ..:/app
      - worker_node_modules:/app/node_modules
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: pgvector/pgvector:pg16
    container_name: zentra-postgres
    environment:
      POSTGRES_USER: zentra
      POSTGRES_PASSWORD: zentra
      POSTGRES_DB: zentra
    ports:
      - "5433:5432"
    volumes:
      - zentra_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zentra-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: inkflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - zentra_minio:/data

  minio-init:
    image: minio/mc:latest
    container_name: zentra-minio-init
    depends_on:
      - minio
    env_file:
      - ../.env
    volumes:
      - ./:/infra
    entrypoint: ["/bin/sh", "/infra/minio-create-bucket.sh"]

volumes:
  zentra_pgdata:
  zentra_minio:
  web_node_modules:
  api_node_modules:
  worker_node_modules:
