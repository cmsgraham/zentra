<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Zentra</title>
  <link rel="icon" href="/zentra_logo_azul.png" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #f7f7fb;
      color: #1a1a2c;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #14151c; color: #e6e8ef; }
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
      padding: 32px 24px; border-radius: 14px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      .card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
    }
    img { width: 64px; height: 64px; }
    h1 { font-size: 20px; margin: 16px 0 6px; }
    p { font-size: 14px; opacity: 0.75; line-height: 1.5; margin: 0 0 16px; }
    button {
      font: inherit; border: 0; padding: 10px 18px; border-radius: 9px;
      background: #191f4a; color: #fff; cursor: pointer;
    }
    .links { margin-top: 14px; font-size: 13px; }
    .links a { color: inherit; opacity: 0.7; margin: 0 6px; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/zentra_logo_azul.png" alt="Zentra" />
    <h1>You’re offline</h1>
    <p>
      We can’t reach the network right now. Your most recently visited pages
      are still available — try opening one of them below.
    </p>
    <button onclick="location.reload()">Try again</button>
    <div class="links">
      <a href="/today">Today</a>·
      <a href="/lists">Lists</a>·
      <a href="/planner">Planner</a>
    </div>
  </div>
</body>
</html>
