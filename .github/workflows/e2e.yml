name: E2E — /today flow

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
  schedule:
    # Nightly smoke against prod (08:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://usezentra.app'

env:
  # Opt into Node.js 24 runtime for GitHub Actions (Node 20 deprecated Sep 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web/tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/tests/package.json

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          ZENTRA_BASE_URL: ${{ inputs.base_url || 'https://usezentra.app' }}
          ZENTRA_TEST_EMAIL: ${{ secrets.ZENTRA_TEST_EMAIL }}
          ZENTRA_TEST_PASSWORD: ${{ secrets.ZENTRA_TEST_PASSWORD }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/tests/playwright-report
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/tests/test-results
          retention-days: 14
